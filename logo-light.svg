<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <radialGradient id="globeL" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#e8fffe"/>
    <stop offset="50%" stop-color="#b8f0ec"/>
    <stop offset="100%" stop-color="#8ee0da"/>
  </radialGradient>
  <radialGradient id="glowL" cx="50%" cy="50%" r="55%">
    <stop offset="60%" stop-color="#00ffcc" stop-opacity="0"/>
    <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.12"/>
  </radialGradient>
  <radialGradient id="bodyL" cx="45%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#ff7675"/>
    <stop offset="100%" stop-color="#d63031"/>
  </radialGradient>
  <radialGradient id="headL" cx="45%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#ff8a80"/>
    <stop offset="100%" stop-color="#e74c3c"/>
  </radialGradient>
  <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#5fffd4"/>
    <stop offset="60%" stop-color="#00e5aa"/>
    <stop offset="100%" stop-color="#00bb88"/>
  </radialGradient>
</defs>
<!-- Background -->
<rect width="200" height="200" fill="#fafafa"/>
<!-- Globe -->
<circle cx="100" cy="90" r="78" fill="url(#globeL)"/>
<circle cx="100" cy="90" r="78" fill="url(#glowL)"/>
<!-- Globe grid -->
<g stroke="#55d4cc" fill="none" stroke-width="1.1" stroke-opacity="0.6">
  <ellipse cx="100" cy="90" rx="75" ry="18"/>
  <ellipse cx="100" cy="90" rx="75" ry="40"/>
  <ellipse cx="100" cy="90" rx="75" ry="62"/>
  <ellipse cx="100" cy="90" rx="18" ry="75"/>
  <ellipse cx="100" cy="90" rx="42" ry="75"/>
  <ellipse cx="100" cy="90" rx="65" ry="75"/>
  <circle cx="100" cy="90" r="75"/>
</g>
<!-- Globe glow ring -->
<circle cx="100" cy="90" r="80" fill="none" stroke="#88eecc" stroke-opacity="0.2" stroke-width="6"/>
<!-- Lobster -->
<g transform="translate(100,115)">
  <!-- Antennae -->
  <path d="M-8,-45 Q-12,-68 -10,-75" stroke="#d63031" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M8,-45 Q12,-68 10,-75" stroke="#d63031" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Left claw arm -->
  <path d="M-30,-10 Q-48,-25 -58,-22" fill="#d63031" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Left claw -->
  <path d="M-55,-22 Q-72,-35 -68,-20 Q-65,-8 -50,-12 Q-58,-22 -55,-22Z" fill="#e74c3c" stroke="#2a3a3a" stroke-width="2"/>
  <path d="M-55,-22 Q-72,-10 -65,-2 Q-58,4 -48,-6 Q-50,-12 -55,-22Z" fill="#d63031" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Right claw arm -->
  <path d="M30,-10 Q48,-25 58,-22" fill="#d63031" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Right claw -->
  <path d="M55,-22 Q72,-35 68,-20 Q65,-8 50,-12 Q58,-22 55,-22Z" fill="#e74c3c" stroke="#2a3a3a" stroke-width="2"/>
  <path d="M55,-22 Q72,-10 65,-2 Q58,4 48,-6 Q50,-12 55,-22Z" fill="#d63031" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Body -->
  <ellipse cx="0" cy="0" rx="38" ry="40" fill="url(#bodyL)" stroke="#2a3a3a" stroke-width="2.5"/>
  <!-- Head/face -->
  <ellipse cx="0" cy="-12" rx="32" ry="30" fill="url(#headL)" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Eyes - outer dark -->
  <circle cx="-14" cy="-18" r="9" fill="#1a2a2a" stroke="#2a3a3a" stroke-width="2"/>
  <circle cx="14" cy="-18" r="9" fill="#1a2a2a" stroke="#2a3a3a" stroke-width="2"/>
  <!-- Eyes - glowing green -->
  <circle cx="-14" cy="-18" r="6" fill="url(#eyeGlowL)"/>
  <circle cx="14" cy="-18" r="6" fill="url(#eyeGlowL)"/>
  <!-- Eye highlights -->
  <circle cx="-16" cy="-20" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="12" cy="-20" r="2" fill="#fff" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M-12,8 Q0,18 12,8" fill="none" stroke="#2a3a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- Inner mouth lines -->
  <path d="M-6,4 Q0,8 6,4" fill="none" stroke="#b02525" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Legs left -->
  <g stroke="#2a3a3a" stroke-width="2" fill="#d63031">
    <path d="M-30,18 Q-45,28 -50,35 Q-46,36 -42,32 Q-38,26 -28,22Z"/>
    <path d="M-26,28 Q-40,40 -44,48 Q-40,48 -36,44 Q-32,38 -24,32Z"/>
    <path d="M-22,36 Q-34,48 -36,56 Q-32,55 -28,50 Q-26,44 -20,38Z"/>
  </g>
  <!-- Legs right -->
  <g stroke="#2a3a3a" stroke-width="2" fill="#d63031">
    <path d="M30,18 Q45,28 50,35 Q46,36 42,32 Q38,26 28,22Z"/>
    <path d="M26,28 Q40,40 44,48 Q40,48 36,44 Q32,38 24,32Z"/>
    <path d="M22,36 Q34,48 36,56 Q32,55 28,50 Q26,44 20,38Z"/>
  </g>
</g>
</svg>
